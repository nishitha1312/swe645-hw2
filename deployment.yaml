# deployment.yaml - Kubernetes Deployment for SWE645 HW2 Student Survey Application
# This manifest creates a Deployment with 3 pod replicas for high availability.
# Author: Sai Nishitha Muraharisetty | Course: SWE645

apiVersion: apps/v1
kind: Deployment
metadata:
  name: studentsurvey-deployment
  namespace: studentsurvey645
  labels:
    app: studentsurvey
spec:
  replicas: 3
  selector:
    matchLabels:
      app: studentsurvey
  template:
    metadata:
      labels:
        app: studentsurvey
    spec:
      containers:
        - name: studentsurvey
          image: nishitha1312/studentsurvey645:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
